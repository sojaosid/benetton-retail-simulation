<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benetton Training Hub - Analytics</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; color: #333; overflow-x: hidden; }
        
        /* Sidebar */
        .floating-hamburger { position: fixed; top: 20px; left: 20px; font-size: 1.8rem; background: white; border: 2px solid #00563f; color: #00563f; border-radius: 8px; cursor: pointer; z-index: 990; padding: 5px 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s; }
        .floating-hamburger:hover { background: #00563f; color: white; }
        .slide-menu { position: fixed; top: 0; left: -280px; width: 250px; height: 100vh; background-color: #00563f; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.2); transition: left 0.3s ease-in-out; z-index: 1000; }
        .slide-menu.active { left: 0; }
        .slide-menu h3 { color: white; margin: 50px 0 20px 10px; font-size: 1.2rem; }
        .menu-link { display: block; color: white; text-decoration: none; padding: 15px 10px; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
        .menu-link:hover { background-color: rgba(255,255,255,0.1); border-left: 4px solid #fff; }
        .close-btn { position: absolute; top: 15px; right: 20px; background: none; border: none; color: white; font-size: 2rem; cursor: pointer; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); z-index: 999; }
        .overlay.active { display: block; }

        .main-content { width: 100%; max-width: 1200px; margin: 0 auto; padding: 80px 30px 40px 30px; }
        .header { margin-bottom: 30px; }
        .cards-container { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; }
        .card { background: white; flex: 1; min-width: 250px; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #00563f; }
        .value { font-size: 2rem; font-weight: bold; }
        .charts-container { display: flex; flex-wrap: wrap; gap: 20px; }
        .chart-box { background: white; flex: 1; min-width: 300px; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); height: 350px; }
    </style>
</head>
<body>

    <button id="menu-toggle" class="floating-hamburger">☰</button>
    <nav id="sidebar" class="slide-menu">
        <button id="close-menu" class="close-btn">&times;</button>
        <h3>Benetton Training Hub</h3>
        <a href="dashboard.html" class="menu-link" style="background-color: rgba(255,255,255,0.1); border-left: 4px solid #fff;">📊 Analytics Dashboard</a>
        <a href="manage-modules.html" class="menu-link">⚙️ Manage Modules</a>
        <a href="index.html" class="menu-link">⬅️ Back to Hub</a>
    </nav>
    <div id="sidebar-overlay" class="overlay"></div>

    <main class="main-content">
        <div class="header">
            <h1>Simulation Performance</h1>
            <p>Historical metrics compiled from training logs.</p>
        </div>

        <div class="cards-container">
            <div class="card"><h3>Total Simulations</h3><div class="value" id="total-sims">0</div></div>
            <div class="card"><h3>Highest Risk Module</h3><div class="value" id="risk-module" style="font-size:1.2rem;">--</div></div>
            <div class="card"><h3>Avg Customer Mood</h3><div class="value" id="mood-module" style="font-size:1.2rem;">--</div></div>
        </div>

        <div class="charts-container">
            <div class="chart-box"><canvas id="errorsChart"></canvas></div>
            <div class="chart-box"><canvas id="moodChart"></canvas></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Renamed variable to 'dashboardSupabase' to prevent variable declaration collisions
        const dashboardSupabase = window.supabase.createClient('https://lttebmghqpahjclycxau.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0dGVibWdocXBhaGpjbHljeGF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDE4NDIsImV4cCI6MjA5MzAxNzg0Mn0.bwsArSg1M4GO0mJV83jttCikkeoXj_HL_yEsRlxptzE');

        async function fetchAnalytics() {
            const { data, error } = await dashboardSupabase.from('training_logs').select('*');
            if (error || !data || data.length === 0) return;

            document.getElementById('total-sims').innerText = data.length;
            
            let modStats = {};
            data.forEach(log => {
                if(!modStats[log.module_name]) modStats[log.module_name] = {m:0, mood:0, count:0};
                modStats[log.module_name].m += parseInt(log.mistakes) || 0;
                modStats[log.module_name].mood += parseInt(log.final_mood_score) || 0;
                modStats[log.module_name].count += 1;
            });

            let labels = Object.keys(modStats);
            let errs = labels.map(l => (modStats[l].m/modStats[l].count).toFixed(1));
            let moods = labels.map(l => Math.round(modStats[l].mood/modStats[l].count));
            
            document.getElementById('risk-module').innerText = labels[0] || "None";
            document.getElementById('mood-module').innerText = (moods[0] || 0) + "%";

            new Chart(document.getElementById('errorsChart'), { type: 'bar', data: { labels, datasets: [{ label: 'Avg Errors', data: errs, backgroundColor: '#dc3545' }] } });
            new Chart(document.getElementById('moodChart'), { type: 'bar', data: { labels, datasets: [{ label: 'Avg Mood', data: moods, backgroundColor: '#ffc107' }] } });
        }

        fetchAnalytics();

        // Menu logic
        const menuToggle = document.getElementById('menu-toggle');
        const closeMenu = document.getElementById('close-menu');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        function toggleSidebar() { sidebar.classList.toggle('active'); overlay.classList.toggle('active'); }
        menuToggle.addEventListener('click', toggleSidebar);
        closeMenu.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
