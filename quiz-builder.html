<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benetton Training Hub - Quiz Builder</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; color: #333; padding: 40px 20px; }
        
        .builder-container { max-width: 900px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 6px solid #00563f; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
        
        .question-card { background: #f8f9fa; border: 1px solid #e9ecef; border-left: 4px solid #00563f; border-radius: 8px; padding: 20px; margin-bottom: 20px; position: relative; }
        .remove-btn { position: absolute; top: 15px; right: 15px; background: #f8d7da; color: #721c24; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .option-row { display: flex; align-items: center; gap: 10px; background: white; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .option-row input[type="radio"] { transform: scale(1.2); cursor: pointer; }
        
        .btn-primary { background: #00563f; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-primary:hover { background: #003d2c; }
        .btn-secondary { background: #e9ecef; color: #333; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-secondary:hover { background: #dee2e6; }
    </style>
</head>
<body>

    <div class="builder-container">
        <div class="header">
            <div>
                <h1 style="color: #333; margin-bottom: 5px;">Knowledge Quiz Builder</h1>
                <a href="manage-modules.html" style="color: #666; text-decoration: none;">&larr; Back to Curriculum</a>
            </div>
            <button class="btn-primary" onclick="publishQuiz()">Publish Quiz</button>
        </div>

        <div class="form-group">
            <label>Quiz Title</label>
            <input type="text" id="quiz-title" class="form-control" placeholder="e.g., Seasonal Promo Policy Check">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="quiz-desc" class="form-control" rows="2" placeholder="Briefly describe what this quiz tests..."></textarea>
        </div>
        <div class="form-group">
            <label>Tags (Comma separated)</label>
            <input type="text" id="quiz-tags" class="form-control" placeholder="e.g., Policy, POS, Assessment">
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">

        <h3 style="margin-bottom: 15px; color: #333;">Questions</h3>
        <div id="questions-container">
            </div>

        <button class="btn-secondary" onclick="addQuestionCard()">➕ Add Question</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const dbUrl = 'https://lttebmghqpahjclycxau.supabase.co'; 
        const dbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0dGVibWdocXBhaGpjbHljeGF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDE4NDIsImV4cCI6MjA5MzAxNzg0Mn0.bwsArSg1M4GO0mJV83jttCikkeoXj_HL_yEsRlxptzE'; 
        const sbClient = window.supabase.createClient(dbUrl, dbKey);

        let questionCount = 0;

        function addQuestionCard() {
            questionCount++;
            const qId = questionCount;
            
            const cardHTML = `
                <div class="question-card" id="q-card-${qId}">
                    <button class="remove-btn" onclick="document.getElementById('q-card-${qId}').remove()">Remove</button>
                    
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label>Question ${qId}</label>
                        <input type="text" class="form-control q-text" placeholder="Enter the question here...">
                    </div>
                    
                    <p style="font-size: 0.85rem; color: #666; margin-bottom: 5px;">Select the radio button next to the correct answer.</p>
                    
                    <div class="options-grid">
                        <div class="option-row">
                            <input type="radio" name="correct-${qId}" value="0" checked>
                            <input type="text" class="form-control q-opt" placeholder="Option A">
                        </div>
                        <div class="option-row">
                            <input type="radio" name="correct-${qId}" value="1">
                            <input type="text" class="form-control q-opt" placeholder="Option B">
                        </div>
                        <div class="option-row">
                            <input type="radio" name="correct-${qId}" value="2">
                            <input type="text" class="form-control q-opt" placeholder="Option C">
                        </div>
                        <div class="option-row">
                            <input type="radio" name="correct-${qId}" value="3">
                            <input type="text" class="form-control q-opt" placeholder="Option D">
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 15px; margin-bottom: 0;">
                        <label>Learning Feedback (Shown after they answer)</label>
                        <input type="text" class="form-control q-feedback" placeholder="Explain why the correct answer is right...">
                    </div>
                </div>
            `;
            
            document.getElementById('questions-container').insertAdjacentHTML('beforeend', cardHTML);
        }

        async function publishQuiz() {
            const title = document.getElementById('quiz-title').value.trim();
            const desc = document.getElementById('quiz-desc').value.trim();
            const tags = document.getElementById('quiz-tags').value.trim();
            
            if (!title) return alert("Please enter a Quiz Title.");

            // Gather all questions
            const cards = document.querySelectorAll('.question-card');
            if (cards.length === 0) return alert("You need to add at least one question!");

            const quizData = { questions: [] };
            let validationFailed = false;

            cards.forEach(card => {
                const qText = card.querySelector('.q-text').value.trim();
                const optInputs = card.querySelectorAll('.q-opt');
                const correctRadio = card.querySelector('input[type="radio"]:checked');
                const feedback = card.querySelector('.q-feedback').value.trim();

                const options = Array.from(optInputs).map(input => input.value.trim());

                if (!qText || options.some(opt => opt === "")) {
                    validationFailed = true;
                }

                quizData.questions.push({
                    question: qText,
                    options: options,
                    correctIndex: parseInt(correctRadio.value),
                    feedback: feedback
                });
            });

            if (validationFailed) return alert("Please fill out all question text and option fields before publishing.");

            // Lock the button
            const btn = document.querySelector('.btn-primary');
            btn.innerText = "Saving to Database...";
            btn.disabled = true;

            // Push to Supabase with the new module_type flag!
            const { error } = await sbClient
                .from('module_content')
                .insert([{
                    module_name: title,
                    description: desc,
                    tags: tags,
                    scenario_data: quizData,
                    module_type: 'quiz' // <--- The crucial new flag
                }]);

            if (error) {
                alert("Error saving quiz: " + error.message);
                btn.innerText = "Publish Quiz";
                btn.disabled = false;
            } else {
                alert("Quiz Published Successfully!");
                window.location.href = "manage-modules.html";
            }
        }

        // Add one empty question by default on load
        window.onload = addQuestionCard;
    </script>
</body>
</html>
